name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare static artifact
        run: |
          rm -rf site
          mkdir site
          cp index.html style.css viz.js catalog.json 404.html .nojekyll VERSION site/
          cp README.md ABOUT.md ARCHITECTURE.md SPECS.md KANBAN.md ISSUES.md RELEASES.md CHANGELOG.md LICENSE.md NOTICE.md CONTRIBUTING.md SECURITY.md CITATION.cff site/
          cp -R docs site/docs
          cp -R implementations site/implementations
          cp -R bibliography site/bibliography

      - name: Validate artifact
        run: |
          test -f site/index.html
          test -f site/style.css
          test -f site/viz.js
          test -f site/catalog.json
          test -f site/.nojekyll
          test -f site/docs/INDEX.md
          test -f site/implementations/coverage-summary.json
          test -f site/bibliography/records.json

      - name: Publish gh-pages branch
        run: |
          cd site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
